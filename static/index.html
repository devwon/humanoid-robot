<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1117">
    <title>Remote CLI</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/style.css?v=17">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>Remote CLI <small style="font-size:10px;color:#8b949e">v5</small></h1>
            <div class="header-actions">
                <span id="connection-status" class="status">connecting...</span>
                <a href="/dashboard" class="icon-btn" title="Cost Dashboard" style="text-decoration:none;font-size:13px;">$</a>
                <button id="new-btn" class="icon-btn" title="New Session">+</button>
            </div>
        </header>

        <!-- Mode tabs -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="claude">Claude</button>
            <button class="mode-tab" data-mode="terminal">Terminal</button>
            <button class="mode-tab" data-mode="robot">Robot</button>
        </div>

        <!-- Claude mode settings -->
        <div id="claude-settings" class="settings-bar">
            <label>
                Lang:
                <select id="lang-select">
                    <option value="ko-KR" selected>KO</option>
                    <option value="en-US">EN</option>
                    <option value="ja-JP">JP</option>
                    <option value="zh-CN">ZH</option>
                </select>
            </label>
            <label>
                <input type="checkbox" id="speak-toggle" checked>
                Auto-speak
            </label>
            <label>
                <input type="checkbox" id="wakeword-toggle">
                Wake
            </label>
        </div>

        <!-- Robot mode toolbar (minimal) -->
        <div id="robot-toolbar" class="robot-bar" style="display:none">
            <button id="robot-connect-btn" class="robot-connect-btn">Connect</button>
            <span id="robot-status-led" class="robot-led"></span>
            <div class="robot-bar-spacer"></div>
            <select id="robot-camera-select" class="robot-select">
                <option value="front">Front</option>
                <option value="top">Top</option>
                <option value="both">Both</option>
            </select>
            <select id="robot-speed" class="robot-select">
                <option value="1">Slow</option>
                <option value="2" selected>Mid</option>
                <option value="5">Fast</option>
            </select>
        </div>

        <!-- Terminal mode toolbar -->
        <div id="terminal-toolbar" class="settings-bar" style="display:none">
            <select id="tmux-session-select">
                <option value="">-- select session --</option>
            </select>
            <button id="tmux-refresh-btn" class="icon-btn" title="Refresh">↻</button>
            <button id="tmux-new-btn" class="icon-btn" title="New Session">+</button>
            <label>
                <input type="checkbox" id="tmux-auto-refresh">
                Auto
            </label>
        </div>

        <!-- Claude messages -->
        <div id="messages" class="messages">
            <div class="message system">Claude Code Bridge ready. Speak or type to start.</div>
        </div>

        <!-- Terminal key bar -->
        <div id="terminal-keybar" class="key-bar" style="display:none">
            <button class="key-btn" data-key="Up">↑</button>
            <button class="key-btn" data-key="Down">↓</button>
            <button class="key-btn" data-key="Left">←</button>
            <button class="key-btn" data-key="Right">→</button>
            <button class="key-btn" data-key="Enter">Enter</button>
            <button class="key-btn" data-key="Tab">Tab</button>
            <button class="key-btn" data-key="Escape">Esc</button>
            <button class="key-btn" data-key="C-c">^C</button>
            <button class="key-btn" data-key="C-d">^D</button>
            <button class="key-btn" data-key="C-z">^Z</button>
            <button class="key-btn" data-key="Space">Spc</button>
        </div>

        <!-- Terminal output -->
        <div id="terminal-output" class="terminal-pane" style="display:none"></div>

        <!-- Robot pane — game controller layout -->
        <div id="robot-pane" style="display:none">
            <!-- Camera fills top -->
            <div class="rc-view">
                <img id="robot-cam-front" class="rc-cam" alt="">
                <img id="robot-cam-top" class="rc-cam" alt="">
                <!-- floating stop -->
                <button id="robot-stop-btn" class="rc-stop">STOP</button>
            </div>

            <!-- Controller area -->
            <div class="rc-pad">
                <!-- Left stick -->
                <div class="rc-stick">
                    <canvas id="robot-joystick-l" width="200" height="200"></canvas>
                    <span class="rc-stick-label">L</span>
                </div>

                <!-- Center column: wrist_flex + gripper + presets -->
                <div class="rc-center">
                    <div class="rc-sliders-row">
                        <div class="rc-grip">
                            <span class="rc-slider-label">Flex</span>
                            <input type="range" id="robot-wrist-flex" min="-100" max="100" value="0" orient="vertical">
                            <span class="rc-grip-icon" id="robot-wrist-flex-val">0</span>
                        </div>
                        <div class="rc-grip">
                            <span class="rc-slider-label">Grip</span>
                            <input type="range" id="robot-gripper" min="-100" max="100" value="0" orient="vertical">
                            <span class="rc-grip-icon" id="robot-gripper-val">0</span>
                        </div>
                    </div>
                    <div class="rc-actions">
                        <button class="rc-btn robot-preset" data-action="home">H</button>
                        <button class="rc-btn robot-preset" data-action="grab">G</button>
                        <button class="rc-btn robot-preset" data-action="release">R</button>
                    </div>
                </div>

                <!-- Right stick -->
                <div class="rc-stick">
                    <canvas id="robot-joystick-r" width="200" height="200"></canvas>
                    <span class="rc-stick-label">R</span>
                </div>
            </div>

            <!-- Hidden state holder for slider sync -->
            <div id="robot-sliders" style="display:none">
                <div class="robot-slider-row" data-joint="shoulder_pan"><input type="range" value="0"><span class="slider-val">0</span></div>
                <div class="robot-slider-row" data-joint="shoulder_lift"><input type="range" value="0"><span class="slider-val">0</span></div>
                <div class="robot-slider-row" data-joint="elbow_flex"><input type="range" value="0"><span class="slider-val">0</span></div>
                <div class="robot-slider-row" data-joint="wrist_flex"><input type="range" value="0"><span class="slider-val">0</span></div>
                <div class="robot-slider-row" data-joint="wrist_roll"><input type="range" value="0"><span class="slider-val">0</span></div>
                <div class="robot-slider-row" data-joint="gripper"><input type="range" value="0"><span class="slider-val">0</span></div>
            </div>
        </div>

        <div id="wake-indicator" class="wake-indicator"></div>
        <div id="interim-text" class="interim"></div>

        <div class="input-area">
            <button id="mic-btn" class="action-btn" title="Voice Input">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="23"/>
                    <line x1="8" y1="23" x2="16" y2="23"/>
                </svg>
            </button>
            <textarea id="text-input" rows="1" placeholder="Type or speak a message..."></textarea>
            <button id="send-btn" class="action-btn" title="Send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
            <button id="stop-btn" class="action-btn" title="Stop">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="/static/speech.js?v=17"></script>
    <script src="/static/app.js?v=17"></script>
    <script>
        if ('serviceWorker' in navigator) {
            // Unregister all service workers and clear all caches
            navigator.serviceWorker.getRegistrations().then(regs => {
                regs.forEach(r => r.unregister());
            });
            caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        }
        window.onerror = function(msg, src, line) {
            document.title = 'ERR: ' + msg;
            var el = document.getElementById('messages');
            if (el) {
                var d = document.createElement('div');
                d.className = 'message system';
                d.textContent = 'JS Error: ' + msg + ' (line ' + line + ')';
                d.style.color = '#f85149';
                el.appendChild(d);
            }
        };
    </script>
</body>
</html>
