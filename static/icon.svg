<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="lens-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="lens-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#da7756" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#da7756" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d1117"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="1">
    <line x1="96" y1="0" x2="96" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="416" y1="0" x2="416" y2="512"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
  </g>

  <!-- Glasses frame -->
  <g transform="translate(256,210)" filter="url(#glow)">
    <!-- Left lens fill -->
    <ellipse cx="-82" cy="0" rx="72" ry="48" fill="url(#lens-l)"/>
    <!-- Right lens fill -->
    <ellipse cx="82" cy="0" rx="72" ry="48" fill="url(#lens-r)"/>
    <!-- Frame outline -->
    <g fill="none" stroke="#58a6ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="-82" cy="0" rx="72" ry="48"/>
      <ellipse cx="82" cy="0" rx="72" ry="48"/>
      <!-- Bridge -->
      <path d="M-10 -4 Q0-18 10-4"/>
      <!-- Temples -->
      <path d="M-154 -8 L-184 -32" stroke-width="10"/>
      <path d="M154 -8 L184 -32" stroke-width="10"/>
    </g>
    <!-- Claude sparkle in right lens -->
    <circle cx="100" cy="-8" r="4" fill="#da7756" opacity="0.8"/>
    <circle cx="112" cy="6" r="2.5" fill="#da7756" opacity="0.5"/>
  </g>

  <!-- Terminal prompt -->
  <g transform="translate(256,330)">
    <text font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="36" font-weight="600" text-anchor="middle" letter-spacing="2">
      <tspan fill="#8b949e">$</tspan>
      <tspan fill="#58a6ff" dx="8">remote</tspan>
      <tspan fill="#da7756" dx="4">_</tspan>
    </text>
  </g>

  <!-- Connection dots -->
  <g fill="#58a6ff" opacity="0.3">
    <circle cx="180" cy="390" r="3"/>
    <circle cx="220" cy="390" r="3"/>
    <circle cx="260" cy="390" r="3"/>
    <circle cx="300" cy="390" r="3"/>
    <circle cx="340" cy="390" r="3"/>
  </g>
</svg>
