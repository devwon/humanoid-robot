<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human as a Robot — Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a; color: #e0e0e0; height: 100vh; overflow: hidden;
        }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; background: #111; border-bottom: 1px solid #222;
        }
        .header h1 { font-size: 18px; color: #4fc3f7; }
        .header .title-accent { color: #f44336; }
        #connection-status {
            font-size: 12px; padding: 4px 10px; border-radius: 12px;
            background: #333; color: #aaa;
        }
        #connection-status.connected { background: #1b5e20; color: #81c784; }

        .grid {
            display: grid; grid-template-columns: 300px 1fr 340px;
            height: calc(100vh - 50px);
        }

        .panel { display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; }
        .panel:last-child { border-right: none; }
        .panel-header {
            padding: 10px 16px; background: #111; border-bottom: 1px solid #1a1a1a;
            font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .panel-body { flex: 1; overflow-y: auto; padding: 12px; }

        /* AI Panel */
        .ai-entry { margin-bottom: 12px; animation: fadeIn 0.3s; }
        .ai-speech {
            background: #1a237e; border-radius: 12px; padding: 12px 14px;
            font-size: 14px; line-height: 1.5;
        }
        .ai-thinking {
            color: #666; font-style: italic; font-size: 13px; padding: 4px 0;
            border-left: 2px solid #333; padding-left: 10px;
        }

        /* Code Panel */
        .file-tabs {
            display: flex; gap: 2px; padding: 8px 12px; background: #0d0d0d;
            overflow-x: auto; flex-wrap: nowrap;
        }
        .file-tab {
            padding: 6px 12px; background: #1a1a1a; border-radius: 6px 6px 0 0;
            font-size: 12px; cursor: pointer; white-space: nowrap;
            font-family: 'SF Mono', monospace; color: #888;
        }
        .file-tab.active { background: #282c34; color: #4fc3f7; }
        #code-content {
            flex: 1; overflow: auto; background: #282c34;
            padding: 16px; font-size: 13px; line-height: 1.6;
        }
        #code-content pre { margin: 0; }
        #code-content code { font-family: 'SF Mono', 'Fira Code', monospace; }

        /* Tool Panel */
        .tool-entry {
            margin-bottom: 8px; padding: 10px; background: #111;
            border-radius: 8px; border-left: 3px solid #4fc3f7;
            animation: fadeIn 0.2s; font-size: 13px;
        }
        .tool-entry .time { color: #555; font-size: 11px; }
        .tool-entry .name { color: #4fc3f7; font-weight: 600; }
        .tool-entry .args { color: #888; font-family: 'SF Mono', monospace; font-size: 11px; word-break: break-all; }
        .tool-entry .result { color: #666; font-size: 12px; margin-top: 4px; max-height: 60px; overflow: hidden; white-space: pre-wrap; font-family: 'SF Mono', monospace; }
        .tool-entry.success { border-left-color: #81c784; }
        .tool-entry.error { border-left-color: #f44336; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

        /* Responsive */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Human <span class="title-accent">as a</span> Robot</h1>
        <span id="connection-status">connecting...</span>
    </div>

    <div class="grid">
        <div class="panel">
            <div class="panel-header">AI Brain</div>
            <div class="panel-body" id="ai-feed"></div>
        </div>

        <div class="panel" style="display: flex; flex-direction: column;">
            <div class="panel-header">Generated Code</div>
            <div class="file-tabs" id="file-tabs"></div>
            <div id="code-content"><pre><code class="plaintext">// Waiting for AI to generate code...</code></pre></div>
        </div>

        <div class="panel">
            <div class="panel-header">Tool Execution</div>
            <div class="panel-body" id="tool-feed"></div>
        </div>
    </div>

    <script>
    (() => {
        const aiFeed = document.getElementById('ai-feed');
        const toolFeed = document.getElementById('tool-feed');
        const fileTabs = document.getElementById('file-tabs');
        const codeContent = document.getElementById('code-content');
        const statusEl = document.getElementById('connection-status');

        const files = {}; // path -> content
        let activeFile = null;

        // --- WebSocket ---
        const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        let ws = null;

        function connect() {
            ws = new WebSocket(`${wsProto}//${location.host}/ws/monitor`);
            ws.onopen = () => { statusEl.textContent = 'live'; statusEl.className = 'connected'; };
            ws.onclose = () => { statusEl.textContent = 'disconnected'; statusEl.className = ''; setTimeout(connect, 2000); };
            ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
        }

        function handleEvent(event) {
            const t = event.type;

            if (t === 'speech') {
                addAI('speech', event.content);
            } else if (t === 'thinking') {
                addAI('thinking', event.content);
            } else if (t === 'tool_call') {
                addTool(event.tool, event.args, null);
                // Track file creation
                if ((event.tool === 'create_file' || event.tool === 'edit_file') && event.args) {
                    const path = event.args.path;
                    const content = event.args.content || event.args['content...'] || '';
                    if (path) {
                        files[path] = content;
                        renderTabs();
                        showFile(path);
                    }
                }
            } else if (t === 'tool_result') {
                addToolResult(event.tool, event.content);
            } else if (t === 'file_created') {
                files[event.path] = event.content;
                renderTabs();
                showFile(event.path);
            } else if (t === 'ask_human') {
                addAI('speech', '❓ ' + event.content);
            } else if (t === 'take_photo') {
                addAI('speech', '📸 ' + event.content);
            }
        }

        function addAI(type, text) {
            const div = document.createElement('div');
            div.className = 'ai-entry';
            if (type === 'speech') {
                div.innerHTML = `<div class="ai-speech">${escHtml(text)}</div>`;
            } else {
                const short = text.length > 300 ? text.slice(0, 300) + '...' : text;
                div.innerHTML = `<div class="ai-thinking">${escHtml(short)}</div>`;
            }
            aiFeed.appendChild(div);
            aiFeed.scrollTop = aiFeed.scrollHeight;
        }

        function addTool(name, args, result) {
            const div = document.createElement('div');
            div.className = 'tool-entry';
            div.dataset.tool = name;
            const now = new Date().toLocaleTimeString('ko-KR', { hour12: false });
            const argsStr = typeof args === 'object' ? JSON.stringify(args).slice(0, 200) : String(args || '').slice(0, 200);
            div.innerHTML = `<span class="time">${now}</span> <span class="name">${name}</span><div class="args">${escHtml(argsStr)}</div>`;
            toolFeed.appendChild(div);
            toolFeed.scrollTop = toolFeed.scrollHeight;
        }

        function addToolResult(name, content) {
            // Find last tool entry with matching name and add result
            const entries = toolFeed.querySelectorAll('.tool-entry');
            for (let i = entries.length - 1; i >= 0; i--) {
                if (entries[i].dataset.tool === name && !entries[i].querySelector('.result')) {
                    const isErr = (content || '').startsWith('Error');
                    entries[i].classList.add(isErr ? 'error' : 'success');
                    const div = document.createElement('div');
                    div.className = 'result';
                    div.textContent = (content || '').slice(0, 300);
                    entries[i].appendChild(div);
                    break;
                }
            }
            toolFeed.scrollTop = toolFeed.scrollHeight;
        }

        function renderTabs() {
            fileTabs.innerHTML = '';
            for (const path of Object.keys(files)) {
                const tab = document.createElement('div');
                tab.className = 'file-tab' + (path === activeFile ? ' active' : '');
                tab.textContent = path.split('/').pop();
                tab.title = path;
                tab.onclick = () => showFile(path);
                fileTabs.appendChild(tab);
            }
        }

        function showFile(path) {
            activeFile = path;
            renderTabs();
            const content = files[path] || '';
            const ext = path.split('.').pop();
            const langMap = { js: 'javascript', ts: 'typescript', py: 'python', html: 'html', css: 'css', json: 'json', jsx: 'javascript', tsx: 'typescript', md: 'markdown' };
            const lang = langMap[ext] || 'plaintext';
            codeContent.innerHTML = `<pre><code class="${lang}">${escHtml(content)}</code></pre>`;
            try { hljs.highlightAll(); } catch {}
        }

        function escHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        connect();
    })();
    </script>
</body>
</html>
